name: Build Windows one-click app

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Download FFmpeg build
        shell: powershell
        run: |
          $api = "https://api.github.com/repos/BtbN/FFmpeg-Builds/releases/latest"
          $release = Invoke-RestMethod -Uri $api
          $asset = $release.assets | Where-Object { $_.name -like "*win64-gpl*.zip" -and $_.name -notlike "*shared*" } | Select-Object -First 1
          if (-not $asset) { throw "Could not find a suitable FFmpeg zip asset." }

          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_unpack -Force

          $binDir = Get-ChildItem ffmpeg_unpack -Directory | Select-Object -First 1 | ForEach-Object { Join-Path $_.FullName "bin" }
          if (-not (Test-Path (Join-Path $binDir "ffmpeg.exe"))) { throw "ffmpeg.exe not found after extraction." }
          if (-not (Test-Path (Join-Path $binDir "ffprobe.exe"))) { throw "ffprobe.exe not found after extraction." }

          Copy-Item (Join-Path $binDir "ffmpeg.exe") .
          Copy-Item (Join-Path $binDir "ffprobe.exe") .

      - name: Build app
        shell: powershell
        run: |
          if (Test-Path build) { Remove-Item build -Recurse -Force }
          if (Test-Path dist\PopcornAnalyzer) { Remove-Item dist\PopcornAnalyzer -Recurse -Force }
          pyinstaller --clean PopcornAnalyzer.spec

      - name: Upload built app
        uses: actions/upload-artifact@v4
        with:
          name: PopcornAnalyzer-Windows
          path: dist/PopcornAnalyzer
